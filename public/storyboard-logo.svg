<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Storyboard</title>
  <desc id="desc">Minimal logo for Storyboard, a local-first screenshot-to-SwiftUI asset studio.</desc>
  <style>
    :root { --storyboard-ink: #111820; }
    @media (prefers-color-scheme: dark) {
      :root { --storyboard-ink: #ffffff; }
    }
    .ink-stroke {
      stroke: var(--storyboard-ink);
      stroke-width: 16;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .frame-stroke {
      stroke: var(--storyboard-ink);
      stroke-width: 12;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .ink-fill { fill: var(--storyboard-ink); }
    .cue {
      stroke: var(--storyboard-ink);
      stroke-width: 11;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .cue-dash {
      stroke: var(--storyboard-ink);
      stroke-width: 11;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 20 18;
    }
    .wordmark {
      fill: var(--storyboard-ink);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", Inter, "Helvetica Neue", Arial, sans-serif;
      font-size: 120px;
      font-weight: 760;
      letter-spacing: 0;
    }
  </style>
  <g id="storyboard-mark" transform="translate(72 56)">
    <rect x="8" y="8" width="288" height="288" rx="64" class="ink-stroke" />
    <path d="M82 196V82H202" class="frame-stroke" />
    <path d="M112 216V112H232" class="frame-stroke" />
    <rect x="142" y="142" width="118" height="98" rx="9" class="frame-stroke" />
    <circle cx="179" cy="177" r="15" class="ink-fill" />
    <path d="M150 235L181 203L203 222L226 191L254 235H150Z" class="ink-fill" />
    <path d="M245 220H218V247" class="cue" />
    <path d="M218 273V292H238" class="cue" />
    <path d="M270 220H292V242" class="cue" />
    <path d="M263 292H292V263" class="cue-dash" />
    <path d="M264 264L306 306" class="cue" />
    <path d="M306 306H276" class="cue" />
    <path d="M306 306V276" class="cue" />
  </g>
  <text x="424" y="245" class="wordmark">Storyboard</text>
</svg>
